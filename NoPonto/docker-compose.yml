version: "3.9"

services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: transporte_postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7
    container_name: transporte_redis

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: noponto_api

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      TZ: America/Sao_Paulo

      POSTGRES_HOST: 192.168.1.44
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ConnectionStrings__DefaultConnection: Host=192.168.1.44;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Connection: redis:6379

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: